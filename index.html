<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="img">
            <div class="bg">
                <img src="bg-main-desktop.png" alt="" id="main-bg">
            </div>
            <div class="card">
                <div>   
                    <div class="cart">
                        <img src="bg-card-front.png" alt="" id="front">
                        <img src="bg-card-back.png" alt="" id="back">
                    </div>
                    <div class="txt">
                        <img src="card-logo.svg" alt="" id="logo">
                        <br><br><br>
                        <h2>OOOO OOOO OOOO OOOO</h2>
                        <div class="txt1">
                            <p>JANE APPLESEED</p>
                            <p>00/00</p>
                        </div>
                        <p id="pbck">000</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="main">
            <form action="">
                <form action="name">
                    <p>CARDHOLDER NAME</p>
                    <input type="text" name="name" id="" required placeholder="JANE APPLESEED">
                </form><br>
                <form action="num">
                    <p>CARD NUMBER</p>
                    <input type="text" name="num" required placeholder="0000 0000 0000 0000">
                </form><br>
                <div class="dt">
                    <form action="date">
                        <p>EXP. DATE(MM.YY)</p>
                        <input type="text" name="date" required placeholder="00/00">
                    </form><br>
                    <form action="cvc">
                        <p>CVC</p>
                        <input type="text" name="cvc" required placeholder="000">
                    </form><br>
                </div><br>
                <form action="sub">
                    <input type="submit" name="sub" value="Confirm" id="button">
                </form>
            </form>
        </div>
    </div>
</body>
</html>
